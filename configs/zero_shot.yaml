project_name: adalora-bench
task_name: sst2
model_name: roberta-base
method_name: zero_shot
max_train_samples: 2000
max_eval_samples: 500
max_seq_length: 128
generation_max_length: 128
report_to:
  - none
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - query
  - value

training:
  output_dir: outputs/sst2_zero_shot
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  learning_rate: 0.0002
  weight_decay: 0.01
  num_train_epochs: 1
  warmup_ratio: 0.0
  eval_strategy: no
  save_strategy: no
  logging_steps: 50
  max_steps: -1
  seed: 42
  fp16: true
  bf16: false
  gradient_accumulation_steps: 1

tars:
  enabled: false
  r_max: 16
  schedule_steps: [500, 1000, 2000]
  momentum: 0.9
  epsilon: 1e-8
