project_name: adalora-bench
task_name: sst2
model_name: distilbert-base-uncased
method_name: zero_shot
max_train_samples: 32
max_eval_samples: 16
max_seq_length: 128
generation_max_length: 64
report_to:
  - none
lora_r: 4
lora_alpha: 8
lora_dropout: 0.05
target_modules:
  - q_lin
  - v_lin

training:
  output_dir: outputs/smoke_sst2_zero_shot
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  learning_rate: 0.0002
  weight_decay: 0.01
  num_train_epochs: 1
  warmup_ratio: 0.0
  eval_strategy: epoch
  save_strategy: no
  logging_steps: 10
  max_steps: -1
  seed: 42
  fp16: false
  bf16: false
  gradient_accumulation_steps: 1

tars:
  enabled: false
  r_max: 8
  schedule_steps: [10, 20]
  momentum: 0.9
  epsilon: 1e-8
